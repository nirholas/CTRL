<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}

body {
height: 100vh;
display: flex;
flex-direction: column;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
font-size: 13px;
overflow: hidden;
background: var(--col-bg1, #1e1e1e);
color: var(--col-txt1, #e0e0e0);
}

/* ─── Tab Bar ─── */
.tab-bar {
display: flex;
align-items: center;
background: var(--col-bg1, #1e1e1e);
min-height: 36px;
padding: 0 4px;
user-select: none;
gap: 2px;
overflow: hidden;
}

.tabs-container {
display: flex;
flex: 1;
overflow-x: auto;
gap: 2px;
scrollbar-width: none;
align-items: flex-end;
}

.tabs-container::-webkit-scrollbar {
display: none;
}

.tab {
display: flex;
align-items: center;
min-width: 80px;
max-width: 200px;
height: 32px;
padding: 0 8px;
background: transparent;
border: none;
border-radius: 8px 8px 0 0;
cursor: pointer;
gap: 6px;
transition: background 0.15s;
flex-shrink: 0;
position: relative;
}

.tab:hover {
background: var(--col-bg2, #2a2a2a);
}

.tab.active {
background: var(--col-bg2, #2d2d2d);
}

.tab-favicon {
width: 14px;
height: 14px;
flex-shrink: 0;
border-radius: 2px;
}

.tab-title {
flex: 1;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
font-size: 11px;
color: var(--col-txt1, #ccc);
pointer-events: none;
}

.tab .tab-close {
font-size: 14px;
width: 18px;
height: 18px;
display: flex;
align-items: center;
justify-content: center;
border-radius: 4px;
opacity: 0;
cursor: pointer;
flex-shrink: 0;
transition: opacity 0.1s;
color: var(--col-txt1, #aaa);
background: transparent;
border: none;
}

.tab:hover .tab-close,
.tab.active .tab-close {
opacity: 0.6;
}

.tab .tab-close:hover {
opacity: 1;
background: var(--col-bg1, #444);
}

.tab-loading {
width: 14px;
height: 14px;
border: 2px solid var(--col-txt1, #aaa);
border-top-color: transparent;
border-radius: 50%;
animation: tab-spin 0.7s linear infinite;
flex-shrink: 0;
}

@keyframes tab-spin {
to { transform: rotate(360deg); }
}

.new-tab-btn {
width: 28px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
background: transparent;
border: none;
border-radius: 6px;
cursor: pointer;
color: var(--col-txt1, #aaa);
flex-shrink: 0;
transition: background 0.15s;
}

.new-tab-btn:hover {
background: var(--col-bg2, #333);
}

.new-tab-btn .material-symbols-rounded {
font-size: 18px;
}

/* ─── Navigation Bar ─── */
.nav-bar {
display: flex;
align-items: center;
padding: 4px 8px;
gap: 4px;
background: var(--col-bg2, #2d2d2d);
user-select: none;
}

.nav-btn {
width: 28px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
background: transparent;
border: none;
border-radius: 6px;
cursor: pointer;
color: var(--col-txt1, #aaa);
transition: background 0.15s;
flex-shrink: 0;
}

.nav-btn:hover {
background: rgba(255, 255, 255, 0.08);
}

.nav-btn:disabled {
opacity: 0.3;
cursor: default;
}

.nav-btn:disabled:hover {
background: transparent;
}

.nav-btn .material-symbols-rounded {
font-size: 18px;
}

.address-bar {
flex: 1;
display: flex;
align-items: center;
background: var(--col-bg1, #1e1e1e);
border-radius: 20px;
padding: 2px 10px;
gap: 4px;
min-width: 0;
position: relative;
}

.address-bar .material-symbols-rounded {
font-size: 16px;
color: var(--col-txt1, #888);
flex-shrink: 0;
}

.address-input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: var(--col-txt1, #e0e0e0);
font-size: 13px;
min-width: 0;
padding: 4px 0;
}

.address-input::placeholder {
color: var(--col-txt1, #888);
opacity: 0.6;
}

.address-loading-bar {
position: absolute;
bottom: 0;
left: 0;
height: 2px;
background: #6179FF;
border-radius: 0 0 20px 20px;
transition: width 0.3s ease;
width: 0;
}

/* ─── Bookmark Bar ─── */
.bookmark-bar {
display: flex;
align-items: center;
padding: 2px 8px;
gap: 4px;
background: var(--col-bg2, #2d2d2d);
border-top: 1px solid rgba(255, 255, 255, 0.05);
overflow-x: auto;
scrollbar-width: none;
user-select: none;
min-height: 28px;
}

.bookmark-bar::-webkit-scrollbar {
display: none;
}

.bookmark-item {
display: flex;
align-items: center;
gap: 4px;
padding: 3px 8px;
background: transparent;
border: none;
border-radius: 4px;
cursor: pointer;
color: var(--col-txt1, #ccc);
font-size: 11px;
white-space: nowrap;
flex-shrink: 0;
transition: background 0.15s;
}

.bookmark-item:hover {
background: rgba(255, 255, 255, 0.08);
}

.bookmark-item .material-symbols-rounded {
font-size: 14px;
}

/* ─── Content Area ─── */
.browser-content {
flex: 1;
position: relative;
display: flex;
overflow: hidden;
}

.tab-panel {
position: absolute;
inset: 0;
display: none;
}

.tab-panel.active {
display: flex;
}

.tab-panel iframe {
width: 100%;
height: 100%;
border: none;
background: white;
}

/* ─── New Tab Page ─── */
.new-tab-page {
width: 100%;
height: 100%;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
display: flex;
align-items: center;
justify-content: center;
flex-direction: column;
gap: 24px;
padding: 40px;
overflow-y: auto;
}

.ntp-greeting {
font-size: 32px;
font-weight: 300;
color: white;
text-align: center;
}

.ntp-time {
font-size: 48px;
font-weight: 200;
color: white;
text-align: center;
letter-spacing: 2px;
}

.ntp-search {
width: 100%;
max-width: 540px;
display: flex;
align-items: center;
background: rgba(255, 255, 255, 0.18);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.25);
border-radius: 28px;
padding: 10px 20px;
gap: 10px;
}

.ntp-search .material-symbols-rounded {
font-size: 20px;
color: rgba(255, 255, 255, 0.8);
}

.ntp-search input {
flex: 1;
background: transparent;
border: none;
outline: none;
color: white;
font-size: 15px;
}

.ntp-search input::placeholder {
color: rgba(255, 255, 255, 0.6);
}

.ntp-shortcuts {
display: grid;
grid-template-columns: repeat(4, 90px);
gap: 16px;
justify-content: center;
}

.ntp-shortcut {
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
padding: 14px 8px;
background: rgba(255, 255, 255, 0.12);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
border: 1px solid rgba(255, 255, 255, 0.15);
border-radius: 14px;
cursor: pointer;
transition: all 0.2s;
color: white;
}

.ntp-shortcut:hover {
background: rgba(255, 255, 255, 0.22);
transform: translateY(-3px);
}

.ntp-shortcut-icon {
width: 36px;
height: 36px;
border-radius: 50%;
background: rgba(255, 255, 255, 0.2);
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.ntp-shortcut-name {
font-size: 11px;
font-weight: 500;
text-align: center;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
width: 100%;
}

/* ─── Menu Panel ─── */
.menu-overlay {
display: none;
position: fixed;
inset: 0;
z-index: 99;
}

.menu-overlay.open {
display: block;
}

.menu-panel {
position: absolute;
top: 70px;
right: 8px;
width: 240px;
background: var(--col-bg2, #2d2d2d);
border-radius: 10px;
overflow: hidden;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
z-index: 100;
border: 1px solid rgba(255, 255, 255, 0.08);
}

.menu-item {
display: flex;
align-items: center;
gap: 10px;
padding: 10px 14px;
cursor: pointer;
transition: background 0.15s;
color: var(--col-txt1, #ccc);
font-size: 13px;
border: none;
background: none;
width: 100%;
text-align: left;
}

.menu-item:hover {
background: rgba(255, 255, 255, 0.06);
}

.menu-item .material-symbols-rounded {
font-size: 18px;
opacity: 0.7;
}

.menu-divider {
height: 1px;
background: rgba(255, 255, 255, 0.08);
margin: 4px 0;
}

/* ─── Side Panel (History / Bookmarks) ─── */
.side-panel {
display: none;
position: absolute;
top: 0;
right: 0;
width: min(360px, 80%);
height: 100%;
background: var(--col-bg2, #2d2d2d);
box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
z-index: 50;
flex-direction: column;
border-left: 1px solid rgba(255, 255, 255, 0.06);
}

.side-panel.open {
display: flex;
}

.side-panel-header {
display: flex;
align-items: center;
padding: 12px 14px;
gap: 8px;
border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.side-panel-header h3 {
flex: 1;
font-size: 15px;
font-weight: 500;
color: var(--col-txt1, #e0e0e0);
}

.side-panel-body {
flex: 1;
overflow-y: auto;
padding: 8px;
}

.side-panel-body::-webkit-scrollbar {
width: 4px;
}

.side-panel-body::-webkit-scrollbar-thumb {
background: rgba(255, 255, 255, 0.15);
border-radius: 2px;
}

.history-item,
.bookmark-manage-item {
display: flex;
align-items: center;
gap: 8px;
padding: 8px 10px;
cursor: pointer;
border-radius: 6px;
transition: background 0.15s;
}

.history-item:hover,
.bookmark-manage-item:hover {
background: rgba(255, 255, 255, 0.06);
}

.history-item-info,
.bookmark-manage-info {
flex: 1;
min-width: 0;
}

.history-item-title,
.bookmark-manage-title {
font-size: 12px;
color: var(--col-txt1, #ccc);
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.history-item-url,
.bookmark-manage-url {
font-size: 10px;
color: var(--col-txt1, #888);
opacity: 0.6;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.history-item-time {
font-size: 10px;
color: var(--col-txt1, #888);
opacity: 0.5;
flex-shrink: 0;
}

.history-item .delete-btn,
.bookmark-manage-item .delete-btn {
width: 24px;
height: 24px;
display: flex;
align-items: center;
justify-content: center;
background: transparent;
border: none;
border-radius: 4px;
cursor: pointer;
color: var(--col-txt1, #888);
opacity: 0;
transition: opacity 0.15s;
flex-shrink: 0;
}

.history-item:hover .delete-btn,
.bookmark-manage-item:hover .delete-btn {
opacity: 0.6;
}

.history-item .delete-btn:hover,
.bookmark-manage-item .delete-btn:hover {
opacity: 1;
background: rgba(255, 255, 255, 0.08);
}

.delete-btn .material-symbols-rounded {
font-size: 16px;
}

.clear-all-btn {
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
padding: 8px 14px;
margin: 8px;
background: rgba(255, 255, 255, 0.06);
border: none;
border-radius: 6px;
cursor: pointer;
color: var(--col-txt1, #ccc);
font-size: 12px;
transition: background 0.15s;
}

.clear-all-btn:hover {
background: rgba(255, 80, 80, 0.15);
color: #ff6b6b;
}

.clear-all-btn .material-symbols-rounded {
font-size: 16px;
}

/* ─── Error Page ─── */
.error-page {
width: 100%;
height: 100%;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 16px;
color: var(--col-txt1, #ccc);
background: var(--col-bg1, #1e1e1e);
padding: 40px;
text-align: center;
}

.error-page .material-symbols-rounded {
font-size: 48px;
opacity: 0.4;
}

.error-page h2 {
font-size: 18px;
font-weight: 500;
}

.error-page p {
font-size: 13px;
opacity: 0.6;
max-width: 400px;
}

.error-page button {
padding: 8px 20px;
background: #6179FF;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
font-size: 13px;
margin-top: 8px;
}

.error-page button:hover {
background: #4f66e8;
}

/* ─── Autocomplete Dropdown ─── */
.autocomplete-dropdown {
display: none;
position: absolute;
top: 100%;
left: 0;
right: 0;
margin-top: 4px;
background: var(--col-bg2, #2d2d2d);
border-radius: 10px;
box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
border: 1px solid rgba(255, 255, 255, 0.08);
max-height: 240px;
overflow-y: auto;
z-index: 200;
}

.autocomplete-dropdown.open {
display: block;
}

.autocomplete-item {
display: flex;
align-items: center;
gap: 8px;
padding: 8px 12px;
cursor: pointer;
transition: background 0.1s;
font-size: 12px;
color: var(--col-txt1, #ccc);
}

.autocomplete-item:hover,
.autocomplete-item.selected {
background: rgba(255, 255, 255, 0.06);
}

.autocomplete-item .material-symbols-rounded {
font-size: 16px;
opacity: 0.5;
}

.autocomplete-item-text {
flex: 1;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}

.empty-state {
padding: 32px;
text-align: center;
color: var(--col-txt1, #888);
opacity: 0.5;
font-size: 13px;
}
</style>
</head>

<body>

<!-- Tab Bar -->
<div class="tab-bar">
<div class="tabs-container" id="tabsContainer"></div>
<button class="new-tab-btn" onclick="browser.newTab()" title="New tab (Ctrl+T)">
<span class="material-symbols-rounded">add</span>
</button>
</div>

<!-- Navigation Bar -->
<div class="nav-bar">
<button class="nav-btn" id="btnBack" onclick="browser.goBack()" title="Back" disabled>
<span class="material-symbols-rounded">arrow_back</span>
</button>
<button class="nav-btn" id="btnForward" onclick="browser.goForward()" title="Forward" disabled>
<span class="material-symbols-rounded">arrow_forward</span>
</button>
<button class="nav-btn" id="btnReload" onclick="browser.reload()" title="Reload">
<span class="material-symbols-rounded">refresh</span>
</button>
<button class="nav-btn" onclick="browser.goHome()" title="Home">
<span class="material-symbols-rounded">home</span>
</button>
<div class="address-bar" id="addressBar">
<span class="material-symbols-rounded" id="addressIcon">language</span>
<input class="address-input" id="addressInput"
placeholder="Search or enter web address"
autocomplete="off" autocapitalize="off" spellcheck="false"
onfocus="this.select(); browser.showAutocomplete();"
onblur="setTimeout(() => browser.hideAutocomplete(), 200)"
oninput="browser.onAddressInput()"
onkeydown="browser.onAddressKeydown(event)">
<button class="nav-btn" id="btnBookmark" onclick="browser.toggleBookmark()" title="Bookmark this page" style="width:24px;height:24px;">
<span class="material-symbols-rounded" id="bookmarkIcon" style="font-size:16px;">star_border</span>
</button>
<div class="address-loading-bar" id="addressLoadingBar"></div>
<div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
</div>
<button class="nav-btn" onclick="browser.toggleMenu()" title="Menu">
<span class="material-symbols-rounded">more_vert</span>
</button>
</div>

<!-- Bookmark Bar -->
<div class="bookmark-bar" id="bookmarkBar"></div>

<!-- Content Area -->
<div class="browser-content" id="browserContent"></div>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="browser.closeMenu()">
<div class="menu-panel" onclick="event.stopPropagation()">
<button class="menu-item" onclick="browser.newTab(); browser.closeMenu();">
<span class="material-symbols-rounded">add</span> New tab
</button>
<div class="menu-divider"></div>
<button class="menu-item" onclick="browser.openSidePanel('history'); browser.closeMenu();">
<span class="material-symbols-rounded">history</span> History
</button>
<button class="menu-item" onclick="browser.openSidePanel('bookmarks'); browser.closeMenu();">
<span class="material-symbols-rounded">bookmarks</span> Bookmarks
</button>
<div class="menu-divider"></div>
<button class="menu-item" onclick="browser.toggleBookmarkBar(); browser.closeMenu();">
<span class="material-symbols-rounded">bookmark</span> Toggle bookmark bar
</button>
</div>
</div>

<!-- History Side Panel -->
<div class="side-panel" id="historyPanel">
<div class="side-panel-header">
<span class="material-symbols-rounded">history</span>
<h3>History</h3>
<button class="nav-btn" onclick="browser.closeSidePanel('history')" title="Close">
<span class="material-symbols-rounded">close</span>
</button>
</div>
<div class="side-panel-body" id="historyList"></div>
<button class="clear-all-btn" onclick="browser.clearHistory()">
<span class="material-symbols-rounded">delete</span> Clear all history
</button>
</div>

<!-- Bookmarks Side Panel -->
<div class="side-panel" id="bookmarksPanel">
<div class="side-panel-header">
<span class="material-symbols-rounded">bookmarks</span>
<h3>Bookmarks</h3>
<button class="nav-btn" onclick="browser.closeSidePanel('bookmarks')" title="Close">
<span class="material-symbols-rounded">close</span>
</button>
</div>
<div class="side-panel-body" id="bookmarksList"></div>
</div>

<script>
const browser = (() => {
let tabs = [];
let activeTabId = null;
let tabCounter = 0;
let ntxSession = null;
let bookmarkBarVisible = true;

const DEFAULT_BOOKMARKS = [
{ title: "Google", url: "https://www.google.com", icon: "\u{1F50D}" },
{ title: "YouTube", url: "https://www.youtube.com", icon: "\u{1F3AC}" },
{ title: "GitHub", url: "https://github.com", icon: "\u{1F4BB}" },
{ title: "ChatGPT", url: "https://chat.openai.com", icon: "\u{1F916}" },
{ title: "Reddit", url: "https://www.reddit.com", icon: "\u{1F4F1}" },
{ title: "Stack Overflow", url: "https://stackoverflow.com", icon: "\u{1F4DA}" },
{ title: "Wikipedia", url: "https://www.wikipedia.org", icon: "\u{1F4D6}" },
];

const NTP_SHORTCUTS = [
{ title: "Google", url: "https://www.google.com", icon: "\u{1F50D}" },
{ title: "YouTube", url: "https://www.youtube.com", icon: "\u{1F3AC}" },
{ title: "GitHub", url: "https://github.com", icon: "\u{1F4BB}" },
{ title: "ChatGPT", url: "https://chat.openai.com", icon: "\u{1F916}" },
{ title: "Reddit", url: "https://www.reddit.com", icon: "\u{1F4F1}" },
{ title: "Stack Overflow", url: "https://stackoverflow.com", icon: "\u{1F4DA}" },
{ title: "Wikipedia", url: "https://www.wikipedia.org", icon: "\u{1F4D6}" },
{ title: "MDN Docs", url: "https://developer.mozilla.org", icon: "\u{1F4C4}" },
];

// ── Storage helpers (appStorage via NTXSession, fallback to localStorage) ──
function storageKey(key) { return "browser_" + key; }

async function loadData(key, fallback) {
try {
if (ntxSession) {
const val = await ntxSession.send("appStorage.get", storageKey(key));
if (val != null) return JSON.parse(val);
}
} catch (_) {}
try {
const v = localStorage.getItem(storageKey(key));
if (v != null) return JSON.parse(v);
} catch (_) {}
return fallback;
}

async function saveData(key, value) {
const json = JSON.stringify(value);
try {
if (ntxSession) await ntxSession.send("appStorage.set", storageKey(key), json);
} catch (_) {}
try { localStorage.setItem(storageKey(key), json); } catch (_) {}
}

// ── Bookmarks ──
let bookmarks = [];

async function loadBookmarks() {
bookmarks = await loadData("bookmarks", DEFAULT_BOOKMARKS);
renderBookmarkBar();
}

async function saveBookmarks() {
await saveData("bookmarks", bookmarks);
renderBookmarkBar();
}

function renderBookmarkBar() {
const bar = document.getElementById("bookmarkBar");
bar.style.display = bookmarkBarVisible ? "flex" : "none";
bar.innerHTML = "";
bookmarks.forEach((bm, i) => {
const btn = document.createElement("button");
btn.className = "bookmark-item";
btn.innerHTML = '<span style="font-size:14px;">' + escapeHtml(bm.icon || "\u{1F517}") + '</span> ' + escapeHtml(bm.title);
btn.onclick = () => navigateTo(bm.url);
btn.oncontextmenu = (e) => {
e.preventDefault();
if (confirm('Remove bookmark "' + bm.title + '"?')) {
bookmarks.splice(i, 1);
saveBookmarks();
updateBookmarkIcon();
}
};
bar.appendChild(btn);
});
}

function toggleBookmark() {
const tab = getActiveTab();
if (!tab || tab.isNewTab) return;
const idx = bookmarks.findIndex(b => b.url === tab.url);
if (idx >= 0) {
bookmarks.splice(idx, 1);
} else {
bookmarks.push({ title: tab.title || tab.url, url: tab.url, icon: "\u{1F517}" });
}
saveBookmarks();
updateBookmarkIcon();
}

function updateBookmarkIcon() {
const tab = getActiveTab();
const icon = document.getElementById("bookmarkIcon");
if (!tab || tab.isNewTab) { icon.textContent = "star_border"; return; }
icon.textContent = bookmarks.some(b => b.url === tab.url) ? "star" : "star_border";
}

function toggleBookmarkBar() {
bookmarkBarVisible = !bookmarkBarVisible;
document.getElementById("bookmarkBar").style.display = bookmarkBarVisible ? "flex" : "none";
saveData("bookmarkBarVisible", bookmarkBarVisible);
}

// ── History ──
let browsingHistory = [];

async function loadHistory() {
browsingHistory = await loadData("history", []);
}

async function saveHistory() {
await saveData("history", browsingHistory);
}

function addToHistory(url, title) {
if (!url || url === "about:blank") return;
if (browsingHistory.length > 0 && browsingHistory[0].url === url) {
browsingHistory[0].title = title || browsingHistory[0].title;
browsingHistory[0].time = Date.now();
} else {
browsingHistory.unshift({ url: url, title: title || url, time: Date.now() });
}
if (browsingHistory.length > 200) browsingHistory.length = 200;
saveHistory();
}

function clearHistory() {
if (!confirm("Clear all browsing history?")) return;
browsingHistory = [];
saveHistory();
renderHistoryPanel();
}

function renderHistoryPanel() {
const list = document.getElementById("historyList");
if (browsingHistory.length === 0) {
list.innerHTML = '<div class="empty-state">No browsing history</div>';
return;
}
list.innerHTML = "";
browsingHistory.forEach((item, i) => {
const div = document.createElement("div");
div.className = "history-item";
const timeStr = new Date(item.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
const dateStr = new Date(item.time).toLocaleDateString();
div.innerHTML = '<div class="history-item-info">' +
'<div class="history-item-title">' + escapeHtml(item.title) + '</div>' +
'<div class="history-item-url">' + escapeHtml(item.url) + '</div>' +
'</div>' +
'<span class="history-item-time">' + escapeHtml(dateStr) + ' ' + escapeHtml(timeStr) + '</span>' +
'<button class="delete-btn" data-idx="' + i + '" title="Remove">' +
'<span class="material-symbols-rounded">close</span></button>';
div.querySelector(".history-item-info").onclick = () => {
navigateTo(item.url);
closeSidePanel("history");
};
div.querySelector(".delete-btn").onclick = (e) => {
e.stopPropagation();
browsingHistory.splice(i, 1);
saveHistory();
renderHistoryPanel();
};
list.appendChild(div);
});
}

function renderBookmarksPanel() {
const list = document.getElementById("bookmarksList");
if (bookmarks.length === 0) {
list.innerHTML = '<div class="empty-state">No bookmarks</div>';
return;
}
list.innerHTML = "";
bookmarks.forEach((bm, i) => {
const div = document.createElement("div");
div.className = "bookmark-manage-item";
div.innerHTML = '<span style="font-size:18px;">' + escapeHtml(bm.icon || "\u{1F517}") + '</span>' +
'<div class="bookmark-manage-info">' +
'<div class="bookmark-manage-title">' + escapeHtml(bm.title) + '</div>' +
'<div class="bookmark-manage-url">' + escapeHtml(bm.url) + '</div>' +
'</div>' +
'<button class="delete-btn" title="Remove">' +
'<span class="material-symbols-rounded">close</span></button>';
div.querySelector(".bookmark-manage-info").onclick = () => {
navigateTo(bm.url);
closeSidePanel("bookmarks");
};
div.querySelector(".delete-btn").onclick = (e) => {
e.stopPropagation();
bookmarks.splice(i, 1);
saveBookmarks();
renderBookmarksPanel();
updateBookmarkIcon();
};
list.appendChild(div);
});
}

// ── Tab management ──
function genTabId() { return "tab_" + (++tabCounter); }
function getActiveTab() { return tabs.find(t => t.id === activeTabId); }

function newTab(url) {
const id = genTabId();
const isNewTab = !url;
const tab = {
id: id,
title: isNewTab ? "New Tab" : "Loading...",
url: url || "",
isNewTab: isNewTab,
navHistory: [],
historyIndex: -1,
loading: false,
};
tabs.push(tab);
createTabPanel(tab);
renderTabs();
switchTab(id);
if (isNewTab) { showNewTabPage(tab); }
else { navigateTab(tab, url); }
return tab;
}

function createTabPanel(tab) {
const panel = document.createElement("div");
panel.className = "tab-panel";
panel.id = "panel_" + tab.id;
panel.dataset.tabId = tab.id;
document.getElementById("browserContent").appendChild(panel);
}

function showNewTabPage(tab) {
const panel = document.getElementById("panel_" + tab.id);
panel.innerHTML = "";
const ntp = document.createElement("div");
ntp.className = "new-tab-page";

const hour = new Date().getHours();
let greeting = "Good evening";
if (hour < 12) greeting = "Good morning";
else if (hour < 17) greeting = "Good afternoon";

let shortcutsHtml = NTP_SHORTCUTS.map(s =>
'<div class="ntp-shortcut" data-url="' + escapeAttr(s.url) + '">' +
'<div class="ntp-shortcut-icon">' + s.icon + '</div>' +
'<div class="ntp-shortcut-name">' + escapeHtml(s.title) + '</div></div>'
).join("");

ntp.innerHTML =
'<div class="ntp-greeting">' + greeting + '</div>' +
'<div class="ntp-time" id="ntpTime_' + tab.id + '"></div>' +
'<div class="ntp-search">' +
'<span class="material-symbols-rounded">search</span>' +
'<input type="text" placeholder="Search the web..." id="ntpSearch_' + tab.id + '" autocomplete="off" spellcheck="false">' +
'</div>' +
'<div class="ntp-shortcuts">' + shortcutsHtml + '</div>';

panel.appendChild(ntp);

var searchInput = ntp.querySelector("#ntpSearch_" + tab.id);
searchInput.addEventListener("keydown", function(e) {
if (e.key === "Enter" && searchInput.value.trim()) {
navigateTo(resolveUrl(searchInput.value.trim()));
}
});

ntp.querySelectorAll(".ntp-shortcut").forEach(function(el) {
el.onclick = function() { navigateTo(el.dataset.url); };
});

function updateClock() {
var el = document.getElementById("ntpTime_" + tab.id);
if (el) {
el.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
setTimeout(updateClock, 1000);
}
}
updateClock();

tab.isNewTab = true;
tab.title = "New Tab";
tab.url = "";
renderTabs();
updateAddressBar();
}

function navigateTab(tab, url) {
if (!url) return;
tab.isNewTab = false;
tab.url = url;
tab.loading = true;
tab.title = url;

// Push to per-tab nav history
if (tab.historyIndex < tab.navHistory.length - 1) {
tab.navHistory.splice(tab.historyIndex + 1);
}
tab.navHistory.push(url);
tab.historyIndex = tab.navHistory.length - 1;

var panel = document.getElementById("panel_" + tab.id);
panel.innerHTML = "";

var iframe = document.createElement("iframe");
iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation");
iframe.setAttribute("allowtransparency", "true");
iframe.setAttribute("referrerpolicy", "no-referrer");

iframe.onload = function() {
tab.loading = false;
try {
if (iframe.contentDocument && iframe.contentDocument.title) {
tab.title = iframe.contentDocument.title;
}
} catch (_) {}
addToHistory(tab.url, tab.title);
renderTabs();
updateNavButtons();
updateAddressBar();
hideLoadingBar();
};

iframe.onerror = function() {
tab.loading = false;
showErrorPage(tab, url, "Failed to load this page.");
renderTabs();
hideLoadingBar();
};

iframe.src = url;
panel.appendChild(iframe);
renderTabs();
updateAddressBar();
updateNavButtons();
showLoadingBar();
}

function showErrorPage(tab, url, message) {
var panel = document.getElementById("panel_" + tab.id);
panel.innerHTML =
'<div class="error-page">' +
'<span class="material-symbols-rounded">error_outline</span>' +
'<h2>This page can\'t be displayed</h2>' +
'<p>' + escapeHtml(message || "The webpage might be temporarily down or it may have moved to a new address.") + '</p>' +
'<p style="font-size:11px;opacity:0.4;word-break:break-all;">' + escapeHtml(url) + '</p>' +
'<button onclick="browser.reload()">Try again</button>' +
'</div>';
tab.loading = false;
tab.title = "Error";
renderTabs();
}

function switchTab(id) {
activeTabId = id;
document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
var panel = document.getElementById("panel_" + id);
if (panel) panel.classList.add("active");
renderTabs();
updateAddressBar();
updateNavButtons();
updateBookmarkIcon();
}

function closeTab(id) {
var idx = tabs.findIndex(function(t) { return t.id === id; });
if (idx < 0) return;
var panel = document.getElementById("panel_" + id);
if (panel) panel.remove();
tabs.splice(idx, 1);
if (tabs.length === 0) { newTab(); return; }
if (activeTabId === id) {
var newIdx = Math.min(idx, tabs.length - 1);
switchTab(tabs[newIdx].id);
} else {
renderTabs();
}
}

function renderTabs() {
var container = document.getElementById("tabsContainer");
container.innerHTML = "";
tabs.forEach(function(tab) {
var div = document.createElement("div");
div.className = "tab" + (tab.id === activeTabId ? " active" : "");
div.dataset.tabId = tab.id;

// Drag to reorder
div.draggable = true;
div.ondragstart = function(e) {
e.dataTransfer.setData("text/plain", tab.id);
div.style.opacity = "0.5";
};
div.ondragend = function() { div.style.opacity = "1"; };
div.ondragover = function(e) { e.preventDefault(); };
div.ondrop = function(e) {
e.preventDefault();
var draggedId = e.dataTransfer.getData("text/plain");
var fromIdx = tabs.findIndex(function(t) { return t.id === draggedId; });
var toIdx = tabs.findIndex(function(t) { return t.id === tab.id; });
if (fromIdx >= 0 && toIdx >= 0 && fromIdx !== toIdx) {
var moved = tabs.splice(fromIdx, 1)[0];
tabs.splice(toIdx, 0, moved);
renderTabs();
}
};

if (tab.loading) {
div.innerHTML += '<div class="tab-loading"></div>';
} else if (!tab.isNewTab && tab.url) {
var faviconUrl = getFaviconUrl(tab.url);
if (faviconUrl) {
var img = document.createElement("img");
img.className = "tab-favicon";
img.src = faviconUrl;
img.onerror = function() { img.style.display = "none"; };
div.appendChild(img);
}
}

var titleSpan = document.createElement("span");
titleSpan.className = "tab-title";
titleSpan.textContent = tab.title || "New Tab";
div.appendChild(titleSpan);

var closeBtn = document.createElement("button");
closeBtn.className = "tab-close";
closeBtn.innerHTML = '<span class="material-symbols-rounded" style="font-size:14px;">close</span>';
closeBtn.onclick = function(e) { e.stopPropagation(); closeTab(tab.id); };
div.appendChild(closeBtn);

div.onclick = function() { switchTab(tab.id); };
container.appendChild(div);
});

var activeEl = container.querySelector(".tab.active");
if (activeEl) activeEl.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
}

// ── Navigation ──
function navigateTo(input) {
var tab = getActiveTab();
if (!tab) { newTab(resolveUrl(input)); return; }
navigateTab(tab, resolveUrl(input));
}

function resolveUrl(input) {
if (!input) return input;
input = input.trim();
if (/^https?:\/\//i.test(input)) return input;
if (/^ftp:\/\//i.test(input)) return input;
if (!input.includes(" ") && /^[^\s]+\.[a-z]{2,}(\/.*)?$/i.test(input)) {
return "https://" + input;
}
return "https://www.google.com/search?q=" + encodeURIComponent(input);
}

function goBack() {
var tab = getActiveTab();
if (!tab || tab.historyIndex <= 0) return;
tab.historyIndex--;
var url = tab.navHistory[tab.historyIndex];
tab.url = url;
tab.isNewTab = false;
var panel = document.getElementById("panel_" + tab.id);
var iframe = panel.querySelector("iframe");
if (iframe) {
tab.loading = true;
iframe.src = url;
renderTabs();
updateAddressBar();
showLoadingBar();
} else {
navigateTabDirect(tab, url);
}
updateNavButtons();
}

function goForward() {
var tab = getActiveTab();
if (!tab || tab.historyIndex >= tab.navHistory.length - 1) return;
tab.historyIndex++;
var url = tab.navHistory[tab.historyIndex];
tab.url = url;
tab.isNewTab = false;
var panel = document.getElementById("panel_" + tab.id);
var iframe = panel.querySelector("iframe");
if (iframe) {
tab.loading = true;
iframe.src = url;
renderTabs();
updateAddressBar();
showLoadingBar();
} else {
navigateTabDirect(tab, url);
}
updateNavButtons();
}

function navigateTabDirect(tab, url) {
tab.url = url;
tab.isNewTab = false;
tab.loading = true;
var panel = document.getElementById("panel_" + tab.id);
panel.innerHTML = "";
var iframe = document.createElement("iframe");
iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-presentation");
iframe.setAttribute("referrerpolicy", "no-referrer");
iframe.onload = function() {
tab.loading = false;
try { if (iframe.contentDocument && iframe.contentDocument.title) tab.title = iframe.contentDocument.title; } catch (_) {}
renderTabs();
updateNavButtons();
updateAddressBar();
hideLoadingBar();
};
iframe.onerror = function() {
tab.loading = false;
showErrorPage(tab, url);
hideLoadingBar();
};
iframe.src = url;
panel.appendChild(iframe);
renderTabs();
updateAddressBar();
showLoadingBar();
}

function reload() {
var tab = getActiveTab();
if (!tab || tab.isNewTab) return;
var panel = document.getElementById("panel_" + tab.id);
var iframe = panel.querySelector("iframe");
if (iframe) {
tab.loading = true;
renderTabs();
showLoadingBar();
try { iframe.contentWindow.location.reload(); }
catch (_) { iframe.src = iframe.src; }
}
}

function goHome() {
var tab = getActiveTab();
if (!tab) return;
showNewTabPage(tab);
updateNavButtons();
}

function updateNavButtons() {
var tab = getActiveTab();
document.getElementById("btnBack").disabled = !tab || tab.historyIndex <= 0;
document.getElementById("btnForward").disabled = !tab || tab.historyIndex >= tab.navHistory.length - 1;
}

function updateAddressBar() {
var tab = getActiveTab();
var input = document.getElementById("addressInput");
var icon = document.getElementById("addressIcon");
if (!tab || tab.isNewTab) {
input.value = "";
icon.textContent = "language";
} else {
input.value = tab.url;
if (tab.url.startsWith("https://")) icon.textContent = "lock";
else if (tab.url.startsWith("http://")) icon.textContent = "lock_open";
else icon.textContent = "language";
}
updateBookmarkIcon();
}

// ── Loading bar ──
function showLoadingBar() {
var bar = document.getElementById("addressLoadingBar");
bar.style.transition = "width 0.3s ease";
bar.style.width = "60%";
setTimeout(function() { bar.style.width = "85%"; }, 300);
}

function hideLoadingBar() {
var bar = document.getElementById("addressLoadingBar");
bar.style.width = "100%";
setTimeout(function() {
bar.style.transition = "none";
bar.style.width = "0";
}, 200);
}

function getFaviconUrl(url) {
try { return new URL(url).origin + "/favicon.ico"; }
catch (_) { return null; }
}

// ── Address bar input handling ──
function onAddressKeydown(e) {
var dropdown = document.getElementById("autocompleteDropdown");
var items = dropdown.querySelectorAll(".autocomplete-item");
var selected = dropdown.querySelector(".autocomplete-item.selected");
var selectedIdx = -1;
items.forEach(function(it, i) { if (it === selected) selectedIdx = i; });

if (e.key === "ArrowDown") {
e.preventDefault();
if (items.length > 0) {
if (selected) selected.classList.remove("selected");
var next = (selectedIdx + 1) % items.length;
items[next].classList.add("selected");
document.getElementById("addressInput").value = items[next].dataset.url;
}
} else if (e.key === "ArrowUp") {
e.preventDefault();
if (items.length > 0) {
if (selected) selected.classList.remove("selected");
var prev = selectedIdx <= 0 ? items.length - 1 : selectedIdx - 1;
items[prev].classList.add("selected");
document.getElementById("addressInput").value = items[prev].dataset.url;
}
} else if (e.key === "Enter") {
e.preventDefault();
var val = document.getElementById("addressInput").value.trim();
if (val) { hideAutocomplete(); navigateTo(val); }
} else if (e.key === "Escape") {
hideAutocomplete();
document.getElementById("addressInput").blur();
}
}

function onAddressInput() { showAutocomplete(); }

function showAutocomplete() {
var input = document.getElementById("addressInput").value.trim().toLowerCase();
if (!input) { hideAutocomplete(); return; }
var matches = [];
bookmarks.forEach(function(bm) {
if (bm.title.toLowerCase().includes(input) || bm.url.toLowerCase().includes(input)) {
matches.push({ title: bm.title, url: bm.url, type: "bookmark" });
}
});
browsingHistory.forEach(function(h) {
if ((h.title && h.title.toLowerCase().includes(input)) || h.url.toLowerCase().includes(input)) {
if (!matches.some(function(m) { return m.url === h.url; })) {
matches.push({ title: h.title, url: h.url, type: "history" });
}
}
});
if (matches.length === 0) { hideAutocomplete(); return; }

var dropdown = document.getElementById("autocompleteDropdown");
dropdown.innerHTML = "";
matches.slice(0, 8).forEach(function(m) {
var div = document.createElement("div");
div.className = "autocomplete-item";
div.dataset.url = m.url;
div.innerHTML = '<span class="material-symbols-rounded">' + (m.type === "bookmark" ? "star" : "history") + '</span>' +
'<span class="autocomplete-item-text">' + escapeHtml(m.title) + '</span>';
div.onclick = function() { navigateTo(m.url); hideAutocomplete(); };
dropdown.appendChild(div);
});
dropdown.classList.add("open");
}

function hideAutocomplete() {
document.getElementById("autocompleteDropdown").classList.remove("open");
}

// ── Menu ──
function toggleMenu() { document.getElementById("menuOverlay").classList.toggle("open"); }
function closeMenu() { document.getElementById("menuOverlay").classList.remove("open"); }

// ── Side Panels ──
function openSidePanel(name) {
if (name === "history") { renderHistoryPanel(); document.getElementById("historyPanel").classList.add("open"); }
else if (name === "bookmarks") { renderBookmarksPanel(); document.getElementById("bookmarksPanel").classList.add("open"); }
}

function closeSidePanel(name) {
document.getElementById(name + "Panel").classList.remove("open");
}

// ── Keyboard shortcuts ──
document.addEventListener("keydown", function(e) {
if ((e.ctrlKey || e.metaKey) && e.key === "t") { e.preventDefault(); newTab(); }
if ((e.ctrlKey || e.metaKey) && e.key === "w") { e.preventDefault(); if (activeTabId) closeTab(activeTabId); }
if ((e.ctrlKey || e.metaKey) && e.key === "l") { e.preventDefault(); document.getElementById("addressInput").focus(); document.getElementById("addressInput").select(); }
if (e.key === "F5") { e.preventDefault(); reload(); }
if (e.altKey && e.key === "ArrowLeft") { e.preventDefault(); goBack(); }
if (e.altKey && e.key === "ArrowRight") { e.preventDefault(); goForward(); }
});

// Listen for messages from child iframes (e.g. new tab page navigation requests)
window.addEventListener("message", function(e) {
if (e.data && e.data.action === "navigate" && e.data.url) {
navigateTo(e.data.url);
}
});

// Drag-drop URLs onto tab bar
var tabBar = document.querySelector(".tab-bar");
tabBar.addEventListener("dragover", function(e) { e.preventDefault(); });
tabBar.addEventListener("drop", function(e) {
e.preventDefault();
var text = e.dataTransfer.getData("text/plain");
if (text && (text.startsWith("http://") || text.startsWith("https://"))) {
newTab(text);
}
});

// ── Utilities ──
function escapeHtml(str) {
if (!str) return "";
return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function escapeAttr(str) {
if (!str) return "";
return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── Initialization (called by CTRL kernel as greenflag) ──
async function greenflag() {
try { ntxSession = new NTXSession(); } catch (_) {}

await loadBookmarks();
await loadHistory();

bookmarkBarVisible = await loadData("bookmarkBarVisible", true);
renderBookmarkBar();

// Check if opened with a file or URL
var launched = false;
try {
if (myWindow && myWindow.params && myWindow.params.data) {
var defile = myWindow.params.data;
if (typeof defile === "string" && /^https?:\/\//i.test(defile)) {
newTab(defile);
launched = true;
} else {
var file = await ntxSession.send("fileGet.byId", defile);
if (file && file.content) {
var base64Data = file.content.split(",")[1];
var byteChars = atob(base64Data);
var byteArray = new Uint8Array(byteChars.length);
for (var i = 0; i < byteChars.length; i++) {
byteArray[i] = byteChars.charCodeAt(i);
}
var blob = new Blob([byteArray], { type: "text/html" });
newTab(URL.createObjectURL(blob));
launched = true;
}
}
}
} catch (_) {}

if (!launched) newTab();
}

return {
newTab: newTab,
closeTab: closeTab,
switchTab: switchTab,
navigateTo: navigateTo,
goBack: goBack,
goForward: goForward,
reload: reload,
goHome: goHome,
toggleBookmark: toggleBookmark,
toggleBookmarkBar: toggleBookmarkBar,
toggleMenu: toggleMenu,
closeMenu: closeMenu,
openSidePanel: openSidePanel,
closeSidePanel: closeSidePanel,
clearHistory: clearHistory,
showAutocomplete: showAutocomplete,
hideAutocomplete: hideAutocomplete,
onAddressInput: onAddressInput,
onAddressKeydown: onAddressKeydown,
};
})();
</script>
